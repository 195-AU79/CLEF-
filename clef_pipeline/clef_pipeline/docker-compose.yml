#=================================================================
#  CLEF Pipeline — Docker Compose
#
#  Usage:
#    docker compose up -d        # Démarrer le container
#    docker compose exec clef bash  # Shell interactif
#    docker compose down         # Arrêter
#=================================================================

services:
  clef:
    build: .
    image: clef-pipeline:latest
    container_name: clef-hh-bbbb
    
    # Monter le dossier résultats en local
    volumes:
      - ./results:/work/results
      - ./data:/work/clef_pipeline/data
    
    # Garder le container actif
    stdin_open: true
    tty: true
    
    # Ressources (ajuster selon ta machine)
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G
    
    # Variables d'environnement
    environment:
      - KL_CLEF=1.5738738045
      - LUMINOSITY=3000
      - N_EVENTS=100000
    
    # Port Jupyter (optionnel)
    ports:
      - "8888:8888"

  # --- Version GPU pour l'entraînement ParT ---
  clef-gpu:
    build: .
    image: clef-pipeline:latest
    container_name: clef-hh-bbbb-gpu
    profiles: ["gpu"]  # Activer avec: docker compose --profile gpu up
    
    volumes:
      - ./results:/work/results
      - ./data:/work/clef_pipeline/data
    
    stdin_open: true
    tty: true
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    environment:
      - KL_CLEF=1.5738738045
      - NVIDIA_VISIBLE_DEVICES=all
